<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 100 Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>The 100 Countdown</h1>
            <p>The Road to Permanent Chastity</p>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Orgasms Counted</span>
                <span id="total-count" class="value">0 / 100</span>
            </div>
            <div class="stat-card">
                <span class="label">Current Level</span>
                <span id="level-display" class="value">1</span>
            </div>
        </div>

        <div id="status-container" class="status-box">
            <h2 id="status-title">Initialising...</h2>
            <p id="status-desc">Calculating your next milestone.</p>
        </div>

        <div class="actions">
            <button id="roll-btn" class="primary-btn" onclick="game.handleRoll()">Roll Daily Die</button>
            <button id="claim-btn" class="primary-btn hidden" onclick="game.handleScheduled()">Claim Scheduled Orgasm</button>
            <button id="coin-btn" class="primary-btn hidden" onclick="game.flipFinalCoin()">Final Coin Flip</button>
            
            <div class="sim-section">
                <button class="secondary-btn" onclick="game.runSimulation()">Run Entire Game Simulation</button>
            </div>
        </div>

        <div id="sim-results" class="hidden">
            <h3>Simulation Forecast</h3>
            <div id="sim-summary"></div>
            <div id="sim-log" class="log-entries"></div>
        </div>

        <div class="log-section">
            <h3>History Log</h3>
            <div id="history-log" class="log-entries"></div>
        </div>
        
        <footer>
            <button class="reset-link" onclick="game.confirmReset()">Reset All Progress</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
